# Hermes — Temporal self-host bundle.
#
# Single-node Temporal cluster backed by Cassandra, with the Web UI on
# port 8080 and an idempotent namespace initializer. Meant for scale
# tier operators who want full control instead of Temporal Cloud.
#
# Bring it up with:
#   docker compose -f console/deploy/hermes/docker-compose.temporal.yml up -d --wait
#
# All ports are bound to 127.0.0.1 by default — put a reverse proxy in
# front (or override TEMPORAL_BIND / TEMPORAL_UI_BIND) if you need
# remote access.

name: nexus-hermes

x-temporal-env: &temporal_env
  DB: cassandra
  CASSANDRA_SEEDS: cassandra
  CASSANDRA_USER: cassandra
  CASSANDRA_PASSWORD: cassandra
  # Advertise address must be reachable by workers.
  TEMPORAL_ADDRESS: temporal:7233
  TEMPORAL_CLI_ADDRESS: temporal:7233
  # Match the namespace Hermes uses at runtime.
  DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-hermes}
  DEFAULT_NAMESPACE_RETENTION: 72h

services:
  cassandra:
    image: cassandra:4.1
    container_name: nexus-hermes-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: nexus-hermes
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN\\s' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: nexus-hermes-temporal
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      <<: *temporal_env
    ports:
      - "${TEMPORAL_BIND:-127.0.0.1}:7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: nexus-hermes-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "${TEMPORAL_UI_BIND:-127.0.0.1}:8080:8080"
    restart: unless-stopped

  # Idempotent namespace + task queue bootstrap. Runs once, exits 0.
  temporal-init:
    image: temporalio/admin-tools:1.25.2
    container_name: nexus-hermes-init
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NEXUS_NAMESPACE: ${TEMPORAL_NAMESPACE:-hermes}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Ensuring namespace ${NEXUS_NAMESPACE:-hermes} exists..."
        tctl --address temporal:7233 --namespace "${NEXUS_NAMESPACE:-hermes}" \
          namespace describe > /dev/null 2>&1 \
          || tctl --address temporal:7233 --namespace "${NEXUS_NAMESPACE:-hermes}" \
               namespace register --retention 72 --description "Nexus Hermes kernel"
        echo "Namespace ready."
    restart: "no"

volumes:
  cassandra-data:
    name: nexus-hermes-cassandra-data
