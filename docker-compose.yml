services:
  postgres:
    image: postgres:17-alpine
    container_name: nexus-console-postgres
    environment:
      POSTGRES_USER: console
      POSTGRES_PASSWORD: console
      POSTGRES_DB: nexus_console
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U console -d nexus_console"]
      interval: 5s
      timeout: 3s
      retries: 10

  console:
    build: ./console
    container_name: nexus-console-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONSOLE_ENV: local
      CONSOLE_DATABASE_URL: postgresql+asyncpg://console:console@postgres:5432/nexus_console
      CONSOLE_LOCAL_MODE: "true"
      CONSOLE_DATA_DIR: /var/lib/nexus-console
      CONSOLE_DEPLOYMENTS_DIR: /var/lib/nexus-console/deployments
      CONSOLE_LOCAL_PLATFORM_IMAGE: ghcr.io/royramosparaiso/nexus-platform:0.6.0
      CONSOLE_WEBHOOK_URL: http://console:7000/_platform/notify
    ports:
      - "7000:7000"
    volumes:
      - console_data:/var/lib/nexus-console
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build: ./web
    container_name: nexus-console-web
    depends_on:
      - console
    ports:
      - "7001:80"
    profiles:
      - production

volumes:
  postgres_data:
  console_data:
